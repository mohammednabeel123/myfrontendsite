<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sign Up | BeelForge</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Animate -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-dark text-white">

  <!-- NAVBAR -->
  <nav class="px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="{{ url_for('index') }}">
      🐝 BeelForge
    </a>
  </nav>

  <!-- SIGNUP CARD -->
  <div class="vh-100 d-flex justify-content-center align-items-center">

    <div class="card p-4 bg-dark text-white shadow rounded-4 animate__animated animate__fadeIn"
         style="min-width: 320px; max-width: 400px; width: 100%; border: 1px solid #333;">

      <h3 class="text-center mb-4 text-warning fw-bold">
        Create Account
      </h3>

      <!-- 🔥 IMPORTANT: action + name attributes -->
      <form method="POST" action="{{ url_for('register') }}">

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-semibold">
          Sign Up
        </button>

      </form>

      <!-- LOGIN LINK -->
      <p class="mt-3 text-center small">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-warning fw-semibold">
          Login
        </a>
      </p>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
