<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | BeelForge</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Animate -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-dark text-white">

  <!-- NAVBAR -->
  <nav class="px-4 py-3">
    <a class="navbar-brand text-white fw-bold" href="{{ url_for('index') }}">
      🐝 BeelForge
    </a>
  </nav>

  <!-- LOGIN CARD -->
  <div class="vh-100 d-flex justify-content-center align-items-center">

    <div class="card bg-dark text-white p-4 shadow rounded-4 animate__animated animate__fadeIn"
         style="min-width: 320px; max-width: 400px; width: 100%; border: 1px solid #333;">

      <h3 class="text-center mb-4 text-warning fw-bold">
        Login
      </h3>

      <!-- 🔥 FLASH MESSAGES -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <!-- LOGIN FORM -->
      <form method="POST" action="{{ url_for('login') }}">

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-semibold">
          Login
        </button>

      </form>

      <!-- LINKS -->
      <p class="mt-3 text-center small">

        <a href="{{ url_for('register') }}" class="text-warning fw-semibold me-2">
          Create account
        </a>

        |

        <a href="{{ url_for('reset') }}" class="text-warning fw-semibold ms-2">
          Reset password
        </a>

      </p>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
