<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Dynamic title -->
  <title>{% block title %}BeelForge{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&family=Poppins:wght@100..900&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

  <!-- Meta -->
  <meta name="description" content="BeelForge – A hub for my full stack, IoT, and front-end projects.">
  <meta name="keywords" content="BeelForge, full stack, IoT, frontend, JavaScript, web development">
  <meta name="author" content="Nabeel Mohammed Abdul-Mumin">
</head>

<body>

  <!-- NAVBAR -->
  <div class="d-flex justify-content-between align-items-center px-3 py-2 bg-dark">
    <a href="{{ url_for('index') }}" class="btn btn-outline-light">Home</a>
    <button class="btn btn-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample">
      <i class="fa-solid fa-bars me-2 text-dark"></i> Menu
    </button>
  </div>

  <!-- OFFCANVAS MENU -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasExample">
    <div class="offcanvas-header bg-dark">
      <h5 class="offcanvas-title text-warning">BeelForge</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column gap-3 bg-dark text-white">

      <input type="search" class="form-control mb-3" placeholder="Search...">

      <ul class="list-unstyled">
        <li><a href="{{ url_for('main') }}" class="nav-link text-white"><i class="fa-solid fa-folder me-2"></i>Projects</a></li>
        <li><a href="{{ url_for('index') }}#about" class="nav-link text-white"><i class="fa-solid fa-user me-2"></i>About</a></li>
        <li><a href="#contact" class="nav-link text-white"><i class="fa-solid fa-envelope me-2"></i>Contact</a></li>
      </ul>

      {% if session.get('user_id') %}
  <a href="{{ url_for('logout') }}" class="btn btn-danger mt-2">
    <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
  </a>
{% else %}
  <a href="{{ url_for('login') }}" class="btn btn-warning text-white mt-2">
    <i class="fa-solid fa-briefcase me-2"></i>Login
  </a>
{% endif %}

      <a href="{{ url_for('hire_me') }}" class="btn text-white fw-bold"
         style="background: linear-gradient(135deg, #ffb347, #ffcc33); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <i class="fa-solid fa-handshake me-2"></i>Hire Me
      </a>

      <div class="form-check form-switch mt-3">
        <input class="form-check-input" type="checkbox" id="darkModeToggle">
        <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
      </div>

      <div class="mt-auto d-flex gap-3 justify-content-center">
        <a href="https://twitter.com" target="_blank" class="text-white fs-4"><i class="fab fa-twitter"></i></a>
        <a href="https://linkedin.com" target="_blank" class="text-white fs-4"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/mohammednabeel123" target="_blank" class="text-white fs-4"><i class="fab fa-github"></i></a>
      </div>

      <div class="text-center text-white mt-3 small">&copy; 2025 BeelForge</div>
    </div>
  </div>


  <!-- 🔥 PAGE CONTENT GOES HERE -->
  {% block content %}{% endblock %}

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.getElementById('darkModeToggle');
    const html = document.documentElement;

    // Load saved theme
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme) {
        html.setAttribute('data-bs-theme', savedTheme);
        toggle.checked = savedTheme === 'dark';
    } else {
        // System preference fallback
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        html.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
        toggle.checked = prefersDark;
    }

    // Toggle change
    toggle.addEventListener('change', function () {
        if (this.checked) {
            html.setAttribute('data-bs-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            html.setAttribute('data-bs-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
});

function toggleEdit(id) {
  const form = document.getElementById("edit-form-" + id);
  form.classList.toggle("d-none");
}

document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".edit-btn").forEach(btn => {
    btn.addEventListener("click", function () {
      const id = this.getAttribute("data-id");
      const form = document.getElementById("edit-form-" + id);
      if (form) form.classList.toggle("d-none");
    });
  });
});
  </script>
</body>
</html>
